version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-data-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_data_agent}
      MYSQL_USER: ${MYSQL_USER:-dataagent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dataagent123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-data-agent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-dataagent}:${MYSQL_PASSWORD:-dataagent123}@mysql:3306/${MYSQL_DATABASE:-ai_data_agent}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      LLM_MODEL: ${LLM_MODEL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENABLE_PERMISSION_CHECK: ${ENABLE_PERMISSION_CHECK:-true}
      QDRANT_URL: file:///app/data/qdrant
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-api_embeddings}
    volumes:
      - qdrant_data:/app/data/qdrant
      - checkpoint_data:/app/data
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: ai-data-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html/frontend:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  qdrant_data:
  checkpoint_data:
  app_logs:
