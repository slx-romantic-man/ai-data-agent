name: 🐛 Bug Report
description: 报告一个 Bug 帮助我们改进
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈！请填写以下信息，帮助我们快速定位和修复问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述你遇到的 Bug
      placeholder: 当我执行...时，发生了...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供详细的复现步骤
      placeholder: |
        1. 启动服务
        2. 访问 /api/v1/...
        3. 输入...
        4. 看到错误...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望的正确行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的行为
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 粘贴相关的错误日志或堆栈跟踪
      render: shell

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你使用的 AI Data Agent 版本
      placeholder: v1.0.0

  - type: dropdown
    id: environment
    attributes:
      label: 运行环境
      options:
        - Docker
        - 本地开发
        - 生产环境
        - 其他

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 Issue，确认没有重复报告
          required: true
        - label: 我使用的是最新版本
          required: false
